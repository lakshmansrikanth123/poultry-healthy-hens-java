apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp-container
        image: varsha0411/srikanthfullflow:v2
        ports:
        - containerPort: 8080



       

---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service

spec:
  type: LoadBalancer

  selector:
    app: myapp

  ports:
    - name: http
      port: 80           # service port
      targetPort: 8080   # container port
      
